<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#FF6B35">
    <title>Service Express - Annonces locales Burundi</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Menu hamburger -->
<button class="menu-btn" id="menuBtn">
    <span></span>
    <span></span>
    <span></span>
</button>

<!-- Menu latéral -->
<div class="side-menu" id="sideMenu">
    <div class="menu-header">
        <div class="menu-logo">
            <span>🏪</span>
        </div>
        <h3>Service Express</h3>
        <p>Burundi</p>
    </div>

    <div class="menu-items">
        <a href="index.html" class="menu-item active">
            <span class="menu-item-icon">🏠</span>
            <span class="menu-item-text">Accueil</span>
        </a>
        <a href="publier.html" class="menu-item">
            <span class="menu-item-icon">📝</span>
            <span class="menu-item-text">Publier</span>
        </a>
        <a href="admin.html" class="menu-item">
            <span class="menu-item-icon">🛡️</span>
            <span class="menu-item-text">Admin</span>
        </a>
    </div>
</div>

<div class="menu-overlay" id="menuOverlay"></div>

<!-- Hero section -->
<div class="hero-section hero-section-image-only">
    <div class="container">
        <div class="header-content">
            <h1>🏪 SERVICE EXPRESS</h1>
            <p>Trouvez un artisan près de chez vous</p>
            <p class="subtitle">📍 Services disponibles dans tout le Burundi</p>
        </div>
    </div>
</div>

<!-- Contenu principal -->
<main class="container">

    <!-- Barre de recherche -->
    <div class="search-section">
        <div class="search-form">
            <input type="text" id="searchInput" class="search-input"
                   placeholder="🔍 Rechercher un service, artisan, quartier..."
                   autocomplete="off">
            <button id="searchBtn" class="search-btn">Rechercher</button>
        </div>
    </div>

    <!-- Filtres rapides -->
    <div class="quick-filters" id="quickFilters">
        <div class="filter-chip active" data-category="all">⭐ Tous</div>
    </div>

    <!-- Barre de statistiques -->
    <div class="stats-bar" id="statsBar">
        📊 Chargement des services...
    </div>

    <!-- Zone d'affichage -->
    <div id="adsContainer">
        <div class="loading">
            <div class="spinner"></div>
            <p>Chargement des services...</p>
        </div>
    </div>

</main>

<!-- Bouton flottant -->
<a href="publier.html" class="fab-button">
    <span>✏️</span>
</a>

<!-- Modale téléphone -->
<div id="phoneModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <div class="modal-icon">📞</div>
        <h3 id="modalServiceName"></h3>
        <p class="modal-artisan" id="modalArtisanName"></p>
        <div class="modal-phone-number" id="modalPhone"></div>
        <button id="callBtn" class="modal-call-btn">📞 Appeler maintenant</button>
        <p class="modal-note">Cliquez sur le bouton pour appeler directement</p>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
