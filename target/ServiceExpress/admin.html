<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#FF6B35">
    <title>Administration - Service Express</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Styles spécifiques à l'admin */
        .admin-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .admin-card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
        }

        .admin-card h3 {
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .login-form input {
            padding: 0.875rem 1rem;
            border: 2px solid var(--border);
            border-radius: 0.75rem;
            font-size: 1rem;
        }

        .login-form input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-box {
            background: var(--background);
            padding: 1rem;
            border-radius: 1rem;
            text-align: center;
        }

        .stat-box .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-box .stat-label {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .admin-search {
            margin-bottom: 1.5rem;
        }

        .admin-search input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid var(--border);
            border-radius: 0.75rem;
            font-size: 1rem;
        }

        .admin-ads-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .admin-ad-item {
            background: var(--background);
            border-radius: 1rem;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            transition: var(--transition);
        }

        .admin-ad-item:hover {
            background: #eef2f6;
        }

        .admin-ad-info {
            flex: 1;
        }

        .admin-ad-title {
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .admin-ad-meta {
            font-size: 0.75rem;
            color: var(--text-light);
        }

        .admin-ad-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
        }

        /* Modale d'édition */
        .edit-modal {
            display: none;
            position: fixed;
            z-index: 1001;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .edit-modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            border-radius: 1.5rem;
            position: relative;
            max-height: 80vh;
            overflow-y: auto;
        }

        .edit-modal-content .close {
            position: absolute;
            right: 1rem;
            top: 1rem;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);
        }

        .edit-modal-content h3 {
            margin-bottom: 1.5rem;
        }

        .edit-form-group {
            margin-bottom: 1rem;
        }

        .edit-form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .edit-form-group input,
        .edit-form-group textarea,
        .edit-form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid var(--border);
            border-radius: 0.5rem;
        }

        .hero-section-small {
            background: linear-gradient(135deg, var(--secondary), #1a252f);
            padding: 1.5rem;
            border-radius: 0 0 2rem 2rem;
            margin-bottom: 2rem;
            color: white;
            text-align: center;
        }

        @media (max-width: 640px) {
            .admin-ad-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .admin-ad-buttons {
                width: 100%;
            }

            .admin-ad-buttons button {
                flex: 1;
            }

            .edit-modal-content {
                margin: 20% auto;
            }
        }
    </style>
</head>
<body>

<!-- Menu hamburger -->
<button class="menu-btn" id="menuBtn">
    <span></span>
    <span></span>
    <span></span>
</button>

<!-- Menu latéral -->
<div class="side-menu" id="sideMenu">
    <div class="menu-header">
        <div class="menu-logo">
            <span>🏪</span>
        </div>
        <h3>Service Express</h3>
        <p>Administration</p>
    </div>

    <div class="menu-items">
        <a href="index.html" class="menu-item">
            <span class="menu-item-icon">🏠</span>
            <span class="menu-item-text">Accueil</span>
        </a>
        <a href="publier.html" class="menu-item">
            <span class="menu-item-icon">📝</span>
            <span class="menu-item-text">Publier</span>
        </a>
        <a href="admin.html" class="menu-item active">
            <span class="menu-item-icon">🛡️</span>
            <span class="menu-item-text">Admin</span>
        </a>
    </div>
</div>

<div class="menu-overlay" id="menuOverlay"></div>

<!-- Hero section -->
<div class="hero-section-small">
    <h1>🛡️ Administration</h1>
    <p>Gérez les annonces de la plateforme</p>
</div>

<div class="container admin-container">

    <!-- Section connexion -->
    <div id="loginSection" class="admin-card">
        <h3>🔐 Connexion administrateur</h3>
        <form id="loginForm" class="login-form">
            <input type="password" id="adminPassword" placeholder="Mot de passe administrateur" required>
            <button type="submit" class="btn btn-primary">Se connecter</button>
        </form>
        <div id="loginMessage" class="form-message" style="margin-top: 1rem; display: none;"></div>
    </div>

    <!-- Section admin (cachée par défaut) -->
    <div id="adminSection" style="display: none;">

        <!-- Statistiques -->
        <div class="admin-card">
            <h3>📊 Statistiques</h3>
            <div class="admin-stats">
                <div class="stat-box">
                    <div class="stat-value" id="statTotalAds">0</div>
                    <div class="stat-label">Total annonces</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="statCategories">0</div>
                    <div class="stat-label">Catégories</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="statTodayAds">0</div>
                    <div class="stat-label">Annonces aujourd'hui</div>
                </div>
            </div>
        </div>

        <!-- Gestion des annonces -->
        <div class="admin-card">
            <h3>📋 Gestion des annonces</h3>

            <div class="admin-search">
                <input type="text" id="adminSearchInput" placeholder="🔍 Rechercher une annonce..." autocomplete="off">
            </div>

            <div id="adminAdsList" class="admin-ads-list">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Chargement...</p>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Modale d'édition -->
<div id="editModal" class="edit-modal">
    <div class="edit-modal-content">
        <span class="close">&times;</span>
        <h3>✏️ Modifier l'annonce</h3>
        <form id="editForm">
            <input type="hidden" id="editId">

            <div class="edit-form-group">
                <label>Nom du service</label>
                <input type="text" id="editServiceName" required>
            </div>

            <div class="edit-form-group">
                <label>Description</label>
                <textarea id="editDescription" rows="3" required></textarea>
            </div>

            <div class="edit-form-group">
                <label>Prix (FBu)</label>
                <input type="number" id="editPrice">
            </div>

            <div class="edit-form-group">
                <label>Quartier</label>
                <input type="text" id="editLocation" required>
            </div>

            <div class="edit-form-group">
                <label>Téléphone</label>
                <input type="tel" id="editPhone" required>
            </div>

            <div class="edit-form-group">
                <label>Catégorie</label>
                <select id="editCategory">
                    <option value="Coiffure">💇 Coiffure</option>
                    <option value="Réparation téléphone">📱 Réparation téléphone</option>
                    <option value="Menuiserie">🪑 Menuiserie</option>
                    <option value="Couture">👗 Couture</option>
                    <option value="Plomberie">🔧 Plomberie</option>
                    <option value="Électricité">⚡ Électricité</option>
                    <option value="Autre">📌 Autre</option>
                </select>
            </div>

            <div class="edit-form-group">
                <label>Nom de l'artisan</label>
                <input type="text" id="editArtisanName">
            </div>

            <div class="form-buttons" style="margin-top: 1.5rem;">
                <button type="button" class="btn btn-outline" onclick="closeEditModal()">Annuler</button>
                <button type="submit" class="btn btn-primary">Enregistrer</button>
            </div>
        </form>
    </div>
</div>

<script src="js/admin.js"></script>
</body>
</html>
